<h1>Church Leader Encourages Members to Reevaluate Caffeine Use in Observance of Health Code</h1>

<div class="byline">
By Tracie Cudworth | Published April 1, 2026 | 7:37 AM
</div>

<img src="https://i.ytimg.com/vi/8kPB8hFv4-s/maxresdefault.jpg" alt="First Presidency">

<div class="article">

<p>
In a memo published earlier today through the Church’s official newsroom,
President Dallin H. Oaks, president of The Church of Jesus Christ of Latter-day Saints,
invited members worldwide to thoughtfully review their personal caffeine
consumption as part of their observance of the faith’s health code,
commonly referred to as the Word of Wisdom.
</p>

<p>
The message encouraged members to consider how modern beverages containing
significant amounts of caffeine align with the principles taught in
Doctrine and Covenants Section 89, which outlines guidance related to
physical health and spiritual discipline.
</p>

<p>
“While the revealed instruction specifically addresses coffee and tea,”
the memo stated, “members may find spiritual benefit in thoughtfully
evaluating additional sources of caffeine in their daily routines and
seeking personal inspiration regarding their use.”
</p>

<p>
The statement referenced popular drinks such as energy beverages,
caffeinated sodas, and other modern stimulant products as examples
members might consider when reviewing their habits.
</p>

<p>
Church leaders emphasized that the reminder was intended to encourage
greater mindfulness rather than introduce a formal change to existing
standards of worthiness.
</p>

<p>
“As disciples of Jesus Christ, we continually seek to align our daily
choices with principles that promote spiritual clarity, physical health,
and reverence for the bodies God has given us,” the memo continued.
</p>

<p>
Members across social media platforms began discussing the message
shortly after its publication, with many noting that the guidance
reflects the Church’s long-standing emphasis on personal revelation
and thoughtful application of gospel principles.
</p>
